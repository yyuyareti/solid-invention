    <style amp-custom>
        :root {
            --maroon: #800000;
            --maroon-dark: #4a0404;
            --gold: #ffd700;
            --gold-gradient: linear-gradient(180deg, #fff4bb, #ffd700, #b08d26);
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #000;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* Mencegah scroll karena bintang */
        }

        /* --- CSS SHOOTING STARS (NO JS) --- */
        .night {
            position: fixed;
            width: 100%;
            height: 100%;
            transform: rotateZ(45deg);
            z-index: -1;
        }

        .shooting-star {
            position: absolute;
            left: 50%;
            top: 50%;
            height: 2px;
            background: linear-gradient(-45deg, #fff, rgba(0, 0, 255, 0));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px #fff);
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        }

        .shooting-star::before, .shooting-star::after {
            content: '';
            position: absolute;
            top: calc(50% - 1px);
            right: 0;
            height: 2px;
            background: linear-gradient(-45deg, rgba(0, 0, 255, 0), #fff, rgba(0, 0, 255, 0));
            transform: translateX(50%) rotateZ(45deg);
            border-radius: 100%;
            animation: shining 3s ease-in-out infinite;
        }

        .shooting-star::after { transform: translateX(50%) rotateZ(-45deg); }

        /* Varian Bintang - Atur posisi & delay */
        .shooting-star:nth-child(1) { top: 0; left: 0; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 0; left: 200px; animation-delay: 1.5s; }
        .shooting-star:nth-child(3) { top: 100px; left: 400px; animation-delay: 0.8s; }
        .shooting-star:nth-child(4) { top: -50px; left: 600px; animation-delay: 2s; }
        .shooting-star:nth-child(5) { top: 200px; left: 100px; animation-delay: 1.2s; }

        @keyframes tail {
            0% { width: 0; }
            30% { width: 100px; }
            100% { width: 0; }
        }

        @keyframes shining {
            0% { width: 0; }
            50% { width: 30px; }
            100% { width: 0; }
        }

        @keyframes shooting {
            0% { transform: translateX(0); }
            100% { transform: translateX(300px); }
        }
        /* --- END SHOOTING STARS --- */

        .container {
            max-width: 420px;
            width: 100%;
            padding: 25px;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 30px;
            margin: 15px;
            box-shadow: 0 0 30px rgba(128, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        header { margin-bottom: 20px; }

        .welcome h1 {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--gold);
            margin: 0 auto;
            width: fit-content;
            animation: typing 3.5s steps(30, end), blink .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { 50% { border-color: transparent } }

        .banner-wrap {
            position: relative;
            margin: 20px 0;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .btn-wrap {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 16px;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
            border-radius: 15px;
            transition: 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login { background: var(--maroon); color: #fff; box-shadow: 0 4px 15px rgba(128, 0, 0, 0.3); }
        .btn-daftar { background: var(--gold-gradient); color: #4a0404; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }

        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .copyright { margin-top: 25px; font-size: 11px; color: rgba(255,255,255,0.4); }
        .copyright a { color: var(--gold); text-decoration: none; font-weight: bold; }

        .animated { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
